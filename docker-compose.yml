services:
  expo:
    build: .
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - EXPO_TELEMETRY_DISABLED=1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.0.11
      - EXPO_PACKAGER_HOSTNAME=192.168.0.11
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    tty: true
    command:
      - bash
      - -lc
      - 'ulimit -n 1048576 || true; if [ ! -d node_modules ] || [ -z "$(ls -A node_modules 2>/dev/null)" ]; then npm ci || npm install; fi; ./node_modules/.bin/expo start --go --lan --clear --port 8081'

volumes:
  node_modules:
